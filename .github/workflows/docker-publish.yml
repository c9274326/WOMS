name: docker-publish

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional image/Git tag, for example v0.1.123"
        required: false
  push:
    branches:
      - "main"
      - "release/**"

permissions:
  contents: write

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      short_sha: ${{ steps.meta.outputs.short_sha }}
    steps:
      - name: Prepare release metadata
        id: meta
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          if [ -n "${{ github.event.inputs.release_tag }}" ]; then
            RELEASE_TAG="${{ github.event.inputs.release_tag }}"
          elif [ "${GITHUB_REF_NAME}" = "main" ]; then
            RELEASE_TAG="v0.1.${GITHUB_RUN_NUMBER}"
          else
            SAFE_REF="$(echo "${GITHUB_REF_NAME}" | tr '/_' '--' | tr -cd '[:alnum:].-')"
            RELEASE_TAG="${SAFE_REF}-${SHORT_SHA}"
          fi
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"

  publish:
    runs-on: ubuntu-latest
    needs:
      - prepare-release
    strategy:
      matrix:
        include:
          - name: api
            dockerfile: Dockerfile.api
            image: woms-api
          - name: scheduler-worker
            dockerfile: Dockerfile.worker
            image: woms-scheduler-worker
          - name: web
            dockerfile: Dockerfile.web
            image: woms-web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: vars.DOCKERHUB_USERNAME != '' && vars.DOCKERHUB_NAMESPACE != ''
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push release image
        if: vars.DOCKERHUB_USERNAME != '' && vars.DOCKERHUB_NAMESPACE != ''
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            docker.io/${{ vars.DOCKERHUB_NAMESPACE }}/${{ matrix.image }}:${{ needs.prepare-release.outputs.release_tag }}
            docker.io/${{ vars.DOCKERHUB_NAMESPACE }}/${{ matrix.image }}:${{ needs.prepare-release.outputs.short_sha }}
            docker.io/${{ vars.DOCKERHUB_NAMESPACE }}/${{ matrix.image }}:latest

  update-helm-tag:
    runs-on: ubuntu-latest
    needs:
      - prepare-release
      - publish
    if: github.ref_name == 'main' && vars.DOCKERHUB_USERNAME != '' && vars.DOCKERHUB_NAMESPACE != ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Helm image tags
        shell: bash
        run: |
          export RELEASE_TAG="${{ needs.prepare-release.outputs.release_tag }}"
          python - <<'PY'
          from pathlib import Path
          import os
          path = Path("deploy/helm/woms/values.yaml")
          release_tag = os.environ["RELEASE_TAG"]
          text = path.read_text()
          lines = []
          for line in text.splitlines():
              if line.strip().startswith("tag: "):
                  indent = line[: len(line) - len(line.lstrip())]
                  lines.append(f"{indent}tag: {release_tag}")
              else:
                  lines.append(line)
          path.write_text("\n".join(lines) + "\n")
          PY

      - name: Commit Helm tag update
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- deploy/helm/woms/values.yaml; then
            echo "Helm values already use ${{ needs.prepare-release.outputs.release_tag }}"
            exit 0
          fi
          git add deploy/helm/woms/values.yaml
          git commit -m "chore(release): update helm image tag ${{ needs.prepare-release.outputs.release_tag }} [skip ci]"
          git push

  tag-release:
    runs-on: ubuntu-latest
    needs:
      - prepare-release
      - update-helm-tag
    if: github.ref_name == 'main' && vars.DOCKERHUB_USERNAME != '' && vars.DOCKERHUB_NAMESPACE != ''
    steps:
      - name: Checkout updated main
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
          fetch-depth: 0

      - name: Create and push Git tag
        shell: bash
        run: |
          RELEASE_TAG="${{ needs.prepare-release.outputs.release_tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --ff-only origin main
          if git rev-parse "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Tag $RELEASE_TAG already exists"
            exit 0
          fi
          git tag -a "$RELEASE_TAG" -m "WOMS $RELEASE_TAG"
          git push origin "$RELEASE_TAG"
