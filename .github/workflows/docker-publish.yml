name: docker-publish

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
      - "release/**"

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: api
            dockerfile: Dockerfile.api
            image: woms-api
          - name: scheduler-worker
            dockerfile: Dockerfile.worker
            image: woms-scheduler-worker
          - name: web
            dockerfile: Dockerfile.web
            image: woms-web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare tags
        id: meta
        shell: bash
        run: |
          BRANCH_TAG="$(echo "${GITHUB_REF_NAME}" | tr '/_' '--' | tr -cd '[:alnum:].-')"
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "branch_tag=${BRANCH_TAG}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: vars.DOCKERHUB_USERNAME != '' && vars.DOCKERHUB_NAMESPACE != ''
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        if: vars.DOCKERHUB_USERNAME != '' && vars.DOCKERHUB_NAMESPACE != ''
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            docker.io/${{ vars.DOCKERHUB_NAMESPACE }}/${{ matrix.image }}:${{ steps.meta.outputs.branch_tag }}
            docker.io/${{ vars.DOCKERHUB_NAMESPACE }}/${{ matrix.image }}:${{ steps.meta.outputs.short_sha }}

      - name: Push latest on protected main
        if: github.ref_name == 'main' && vars.DOCKERHUB_USERNAME != '' && vars.DOCKERHUB_NAMESPACE != ''
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: docker.io/${{ vars.DOCKERHUB_NAMESPACE }}/${{ matrix.image }}:latest
