name: ci

on:
  pull_request:
  push:
    branches:
      - "feat/**"
      - "main"
      - "release/**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Check formatting
        run: |
          test -z "$(gofmt -l .)"

      - name: Run tests
        run: go test ./...

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - name: api
            dockerfile: Dockerfile.api
          - name: scheduler-worker
            dockerfile: Dockerfile.worker
          - name: web
            dockerfile: Dockerfile.web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          tags: woms-${{ matrix.name }}:ci

  helm-render:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Render Helm chart
        run: helm template woms ./deploy/helm/woms
