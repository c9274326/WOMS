name: ci

on:
  pull_request:
    branches:
      - "main"
  push:
    branches:
      - "feat/**"
      - "main"
      - "release/**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Check formatting
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "$unformatted"
            exit 1
          fi

      - name: Run tests
        run: go test ./...

  web-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run web mock tests
        run: npm run test:web

  docker-build:
    runs-on: ubuntu-latest
    needs:
      - test
      - web-test
    strategy:
      matrix:
        include:
          - name: api
            dockerfile: Dockerfile.api
          - name: scheduler-worker
            dockerfile: Dockerfile.worker
          - name: web
            dockerfile: Dockerfile.web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          tags: woms-${{ matrix.name }}:ci

  helm-render:
    runs-on: ubuntu-latest
    needs:
      - test
      - web-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Build Helm dependencies
        run: helm dependency build ./deploy/helm/woms

      - name: Render Helm chart
        run: helm template woms ./deploy/helm/woms

      - name: Verify scheduler worker HPA render
        run: ./scripts/verify-hpa-render.sh
