<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>WOMS</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">Wafer Order Management System</p>
        <h1>WOMS 排程工作台</h1>
      </div>
      <form id="login-form" class="login-bar">
        <label>
          <span>帳號</span>
          <input name="username" value="sales" autocomplete="username">
        </label>
        <label>
          <span>密碼</span>
          <input name="password" value="demo" type="password" autocomplete="current-password">
        </label>
        <button type="submit">登入</button>
      </form>
    </header>

    <main class="layout">
      <aside class="panel status-panel">
        <p class="eyebrow">Status</p>
        <h2>訂單狀態</h2>
        <div id="status-sidebar" class="status-list"></div>
      </aside>

      <section class="panel panel-main">
        <div class="panel-heading">
          <div>
            <p class="eyebrow">Orders</p>
            <h2>訂單管理</h2>
          </div>
          <div class="toolbar">
            <button id="refresh-orders" type="button">重新整理</button>
          </div>
        </div>

        <div class="filter-panel">
          <div>
            <p class="eyebrow">Exact Filters</p>
            <h3>精準篩選</h3>
          </div>
          <div class="filter-grid">
            <fieldset>
              <legend>客戶</legend>
              <div id="customer-filters" class="check-list"></div>
            </fieldset>
            <fieldset>
              <legend>產線</legend>
              <div id="line-filters" class="check-list"></div>
            </fieldset>
            <fieldset>
              <legend>狀態</legend>
              <div id="status-filters" class="check-list"></div>
            </fieldset>
            <fieldset>
              <legend>優先級</legend>
              <div id="priority-filters" class="check-list"></div>
            </fieldset>
          </div>
        </div>

        <form id="order-form" class="grid-form">
          <label>
            <span>客戶</span>
            <input name="customer" value="ACME">
          </label>
          <label>
            <span>產線</span>
            <select name="lineId">
              <option>A</option>
              <option>B</option>
              <option>C</option>
              <option>D</option>
            </select>
          </label>
          <label>
            <span>數量</span>
            <input name="quantity" type="number" min="25" max="2500" step="25" value="2500">
          </label>
          <label>
            <span>優先級</span>
            <select name="priority">
              <option value="low">低</option>
              <option value="high">高</option>
            </select>
          </label>
          <label>
            <span>交期</span>
            <input name="dueDate" type="date">
          </label>
          <button type="submit">建立待排程訂單</button>
        </form>

        <div class="table-wrap">
          <table>
            <caption>待排程與生產訂單</caption>
            <thead>
              <tr>
                <th class="select-cell">選取</th>
                <th>訂單</th>
                <th>客戶</th>
                <th>產線</th>
                <th class="numeric">數量</th>
                <th>優先級</th>
                <th>狀態</th>
                <th>交期</th>
              </tr>
            </thead>
            <tbody id="orders-body"></tbody>
          </table>
        </div>
        <div class="batch-bar">
          <span id="selected-count">已選取 0 張訂單</span>
          <button id="preview-selected" type="button">試排選取訂單</button>
        </div>

        <section class="calendar-section">
          <div class="panel-heading compact-heading">
            <div>
              <p class="eyebrow">Calendar</p>
              <h2>月排程</h2>
            </div>
            <div class="calendar-controls">
              <button id="prev-month" type="button">上個月</button>
              <strong id="calendar-title"></strong>
              <button id="today-month" type="button">今天</button>
              <button id="next-month" type="button">下個月</button>
            </div>
          </div>
          <div class="calendar-weekdays">
            <span>日</span>
            <span>一</span>
            <span>二</span>
            <span>三</span>
            <span>四</span>
            <span>五</span>
            <span>六</span>
          </div>
          <div id="calendar-grid" class="calendar-grid"></div>
        </section>
      </section>

      <aside class="panel side-panel">
        <div class="panel-heading">
          <div>
            <p class="eyebrow">Scheduling</p>
            <h2>試排與任務</h2>
          </div>
        </div>
        <form id="schedule-form" class="stack-form">
          <label>
            <span>產線</span>
            <select name="lineId">
              <option>A</option>
              <option>B</option>
              <option>C</option>
              <option>D</option>
            </select>
          </label>
          <label>
            <span>開始日期</span>
            <input name="startDate" type="date">
          </label>
          <button name="action" value="preview" type="submit">試排程</button>
          <button name="action" value="job" type="submit">建立排程任務</button>
        </form>
        <div class="preview-panel">
          <p class="eyebrow">Preview Result</p>
          <div id="preview-list" class="preview-list">尚未試排</div>
        </div>
        <pre id="schedule-output" class="output">尚未執行</pre>
      </aside>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
