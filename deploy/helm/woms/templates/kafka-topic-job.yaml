{{- if and .Values.kafkaTopic.enabled .Values.keda.kafka.enabled }}
{{- $partitions := (.Values.kafkaTopic.partitions | int) }}
{{- if lt $partitions 1 }}
{{- $partitions = (.Values.keda.maxReplicaCount | int) }}
{{- end }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "woms.fullname" . }}-kafka-topic
  labels:
    {{- include "woms.labels" . | nindent 4 }}
    app.kubernetes.io/component: kafka-topic
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: kafka-topic
    spec:
      restartPolicy: OnFailure
      containers:
        - name: kafka-topic
          image: "{{ .Values.kafkaTopic.image.repository }}:{{ .Values.kafkaTopic.image.tag }}"
          imagePullPolicy: {{ .Values.kafkaTopic.image.pullPolicy }}
          command:
            - /bin/sh
            - -ec
            - |
              topic={{ .Values.keda.kafka.topic | quote }}
              bootstrap={{ .Values.keda.kafka.bootstrapServers | quote }}
              partitions={{ $partitions }}
              replication={{ .Values.kafkaTopic.replicationFactor | int }}

              until kafka-topics.sh --bootstrap-server "${bootstrap}" --list >/dev/null 2>&1; do
                echo "waiting for Kafka at ${bootstrap}"
                sleep 5
              done

              kafka-topics.sh \
                --bootstrap-server "${bootstrap}" \
                --create \
                --if-not-exists \
                --topic "${topic}" \
                --partitions "${partitions}" \
                --replication-factor "${replication}"

              current="$(kafka-topics.sh --bootstrap-server "${bootstrap}" --describe --topic "${topic}" | awk -F'PartitionCount: ' 'NR==1 { split($2, a, " "); print a[1] }')"
              if [ "${current:-0}" -lt "${partitions}" ]; then
                kafka-topics.sh \
                  --bootstrap-server "${bootstrap}" \
                  --alter \
                  --topic "${topic}" \
                  --partitions "${partitions}"
              fi
{{- end }}
