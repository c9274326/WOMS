apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "woms.fullname" . }}-api
  labels:
    {{- include "woms.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: HTTP_ADDR
              value: ":8080"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "woms.fullname" . }}-api
                  key: JWT_SECRET
            - name: DATABASE_URL
              value: {{ .Values.api.env.databaseUrl | quote }}
            - name: REDIS_ADDR
              value: {{ .Values.api.env.redisAddr | quote }}
            - name: KAFKA_BROKERS
              value: {{ .Values.api.env.kafkaBrokers | quote }}
            - name: KAFKA_SCHEDULE_TOPIC
              value: {{ .Values.api.env.scheduleTopic | quote }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
